name: post-reels

on:
  schedule:
    # 5 posts/day, 1 hour apart. Each run posts ONE reel (accounts alternate).
    # Times = US Eastern prime evening (EDT, UTC-4): 5,6,7,8,9 PM New York.
    - cron: "0 21 * * *"   # 5 PM New York
    - cron: "0 22 * * *"   # 6 PM New York
    - cron: "0 23 * * *"   # 7 PM New York
    - cron: "0 0 * * *"    # 8 PM New York
    - cron: "0 1 * * *"    # 9 PM New York
  workflow_dispatch: {}   # lets us run it manually (the test button)

permissions:
  contents: write

concurrency:
  group: post-reels
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post the next reel (accounts alternate)
        env:
          IG_MEALZEN_USER_ID: ${{ secrets.IG_MEALZEN_USER_ID }}
          IG_MEALZEN_TOKEN: ${{ secrets.IG_MEALZEN_TOKEN }}
          IG_NOURISHLY_USER_ID: ${{ secrets.IG_NOURISHLY_USER_ID }}
          IG_NOURISHLY_TOKEN: ${{ secrets.IG_NOURISHLY_TOKEN }}
        run: python post_next.py --next-any

      - name: Save the posted log
        run: |
          git config user.name "tunnel-bot"
          git config user.email "bot@tunnel.local"
          git add posted.json
          git commit -m "log posted reels [skip ci]" || echo "nothing new to commit"
          git push || echo "push skipped"
