name: post-reels

on:
  schedule:
    # 2 posts/day PER ACCOUNT, ~6 hours apart. Each run posts 1 reel per account.
    # US Eastern (EDT, UTC-4): 12 PM (midday) and 6 PM (evening) New York.
    - cron: "0 16 * * *"   # 12 PM New York
    - cron: "0 22 * * *"   # 6 PM New York
  workflow_dispatch: {}   # lets us run it manually (the test button)

permissions:
  contents: write

concurrency:
  group: post-reels
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post 1 reel per account (jittered timing)
        env:
          IG_MEALZEN_USER_ID: ${{ secrets.IG_MEALZEN_USER_ID }}
          IG_MEALZEN_TOKEN: ${{ secrets.IG_MEALZEN_TOKEN }}
          IG_NOURISHLY_USER_ID: ${{ secrets.IG_NOURISHLY_USER_ID }}
          IG_NOURISHLY_TOKEN: ${{ secrets.IG_NOURISHLY_TOKEN }}
        run: |
          sleep $((RANDOM % 1200))   # random 0-20 min delay so posts never land at a robotic exact time
          python post_next.py --account mealzen || true
          python post_next.py --account nourishly || true

      - name: Save the posted log
        run: |
          git config user.name "tunnel-bot"
          git config user.email "bot@tunnel.local"
          git add posted.json
          git commit -m "log posted reels [skip ci]" || echo "nothing new to commit"
          git push || echo "push skipped"
